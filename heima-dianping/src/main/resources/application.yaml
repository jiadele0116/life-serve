server:
  port: 8082
spring:
  application:
    name: heima-dianping
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/heima-dianping?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: 127.0.0.1
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.heima-dianping.entity # 别名扫描包
# 高德地图API配置
amap:
  key: ${AMAP_API_KEY:your-amap-api-key}  # 请替换为你的高德地图Web服务API Key，也可通过环境变量AMAP_API_KEY传入
  nearby-search-url: https://restapi.amap.com/v3/place/around
logging:
  level:
    com.heima-dianping: debug

# AI 智能客服配置 (通义千问)
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model-name: qwen3-max