<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI测试</title>
</head>
<body>
    <h1>AI智能客服测试</h1>
    <input type="text" id="message" placeholder="输入消息" value="你好">
    <button onclick="send()">发送</button>
    <div id="result"></div>

    <script src="./js/axios.min.js"></script>
    <script>
        async function send() {
            const message = document.getElementById('message').value;
            document.getElementById('result').innerHTML = '发送中...';
            
            try {
                console.log('发送消息:', message);
                const response = await axios.post('/api/ai/chat', message, {
                    headers: { 'Content-Type': 'text/plain' }
                });
                console.log('响应:', response);
                document.getElementById('result').innerHTML = 
                    '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
            } catch (error) {
                console.error('完整错误对象:', error);
                console.error('错误响应:', error.response);
                let errorInfo = '错误类型: ' + error.name + '\n';
                errorInfo += '错误消息: ' + error.message + '\n';
                if (error.response) {
                    errorInfo += '状态码: ' + error.response.status + '\n';
                    errorInfo += '响应数据: ' + JSON.stringify(error.response.data) + '\n';
                }
                document.getElementById('result').innerHTML = '<pre style="color:red">' + errorInfo + '</pre>';
            }
        }
    </script>
</body>
</html>
